<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crypto-Knowledge — the on-chain brain, mapped</title>
<meta name="description" content="Interactive map of everything inside the Crypto-Knowledge brain: every guide, endpoint, address book entry, error pattern and live tool." />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<style>
  :root {
    --paper: #e3e5e4;
    --ink: #48494b;
    --ink-deep: #2b2c2e;
    --ink-mid: rgba(72, 73, 75, 0.55);
    --ink-faint: rgba(72, 73, 75, 0.26);
    --ink-ghost: rgba(72, 73, 75, 0.12);
    --card: #edefee;
    --mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--paper);
    color: var(--ink);
    overflow: hidden;
  }

  /* ---------- map stage ---------- */
  #stage {
    position: fixed; inset: 0;
    cursor: grab;
    touch-action: none;
    display: block;
    width: 100%; height: 100%;
  }
  #stage.dragging { cursor: grabbing; }

  .edge { fill: none; stroke: var(--ink); stroke-opacity: 0.18; stroke-width: 0.7; transition: stroke-opacity 0.45s, stroke-width 0.45s; }
  .edge.trunk { stroke-opacity: 0.4; stroke-width: 1.3; }
  .edge.ref-trunk { stroke-dasharray: 3 3; }
  .edge.hot, .edge.fire { stroke-opacity: 0.9; stroke-width: 1.4; }

  .leaf { cursor: pointer; }
  .leaf circle { fill: var(--ink); fill-opacity: 0.75; stroke: none; transition: fill-opacity 0.2s; }
  .leaf.ring circle { fill: var(--paper); fill-opacity: 1; stroke: var(--ink); stroke-width: 1.1; }
  .leaf text {
    font-family: var(--mono); font-size: 10.5px; fill: var(--ink);
    fill-opacity: 0.78; transition: fill-opacity 0.2s;
  }
  .leaf:hover circle, .leaf.fire circle { fill-opacity: 1; }
  .leaf:hover text, .leaf.fire text { fill: var(--ink-deep); fill-opacity: 1; font-weight: 700; }
  .leaf.fire circle { animation: pulse 0.9s ease-out 1; transform-box: fill-box; transform-origin: center; }
  @keyframes pulse { 0% { transform: scale(1); } 35% { transform: scale(1.9); } 100% { transform: scale(1); } }

  .cat text {
    font-family: var(--mono); font-size: 12.5px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; fill: var(--ink-deep);
  }
  .cat circle { fill: var(--paper); stroke: var(--ink); stroke-width: 1.4; }
  .cat { cursor: pointer; }

  #center-g text { fill: var(--ink-deep); text-anchor: middle; font-family: var(--mono); }
  #center-g .c1 { font-size: 13.5px; font-weight: 700; letter-spacing: 0.1em; }
  #center-g .c2 { font-size: 10.5px; fill-opacity: 0.7; letter-spacing: 0.06em; }
  #center-g circle { fill: var(--paper); stroke: var(--ink); }

  /* search dim/hit states */
  .searching .leaf { opacity: 0.07; }
  .searching .leaf.hit { opacity: 1; }
  .searching .leaf.hit text { fill: var(--ink-deep); fill-opacity: 1; font-weight: 700; }
  .searching .edge { stroke-opacity: 0.05; }
  .searching .edge.hit { stroke-opacity: 0.75; stroke-width: 1.2; }
  .searching .cat { opacity: 0.25; }
  .searching .cat.hit { opacity: 1; }

  /* ---------- chrome ---------- */
  .chrome { position: fixed; z-index: 5; pointer-events: none; }
  .chrome > * { pointer-events: auto; }

  #masthead { top: 22px; left: 26px; max-width: min(620px, calc(100vw - 52px)); }
  #masthead-body { display: none; margin-top: 10px; background: var(--card); border: 1px solid var(--ink-faint); padding: 14px 16px; }
  body.info-open #masthead-body { display: block; }
  .zbtn[aria-expanded="true"] { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  #masthead .wordmark { font-size: 15px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-deep); }
  #masthead .wordmark a { color: inherit; text-decoration: none; }
  #masthead .claim { margin-top: 6px; font-size: 11px; color: var(--ink-mid); max-width: 46ch; line-height: 1.5; }
  #statline {
    margin-top: 12px; font-size: 11.5px; line-height: 1.9; color: var(--ink);
    display: flex; flex-wrap: wrap; column-gap: 14px; row-gap: 0;
  }
  #statline b { font-size: 13px; color: var(--ink-deep); font-variant-numeric: tabular-nums; }
  #statline span::after { content: " ·"; color: var(--ink-faint); }
  #statline span:last-child::after { content: ""; }

  #controls { top: 22px; right: 26px; display: flex; gap: 8px; align-items: flex-start; transition: right 0.28s ease; }
  body.panel-open #controls { right: calc(min(360px, 92vw) + 26px); }
  #search {
    display: none;
    font-family: var(--mono); font-size: 12px; color: var(--ink-deep);
    background: var(--card); border: 1px solid var(--ink-faint);
    padding: 8px 10px; width: 220px; outline: none;
  }
  body.search-open #search { display: block; }
  #search:focus { border-color: var(--ink); }
  #search::placeholder { color: var(--ink-mid); }
  #matchcount { display: none; position: absolute; top: 40px; right: 162px; font-size: 10.5px; color: var(--ink-mid); }
  body.search-open #matchcount { display: block; }
  .zbtn {
    font-family: var(--mono); font-size: 14px; line-height: 1;
    width: 32px; height: 32px; background: var(--card); color: var(--ink-deep);
    border: 1px solid var(--ink-faint); cursor: pointer;
  }
  .zbtn:hover, .zbtn:focus-visible { border-color: var(--ink); outline: none; }

  #footer { bottom: 18px; left: 26px; font-size: 11px; color: var(--ink-mid); display: flex; flex-wrap: wrap; gap: 4px 14px; }
  #footer a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--ink-faint); }
  #footer a:hover { color: var(--ink-deep); border-color: var(--ink); }
  #hint { bottom: 18px; right: 26px; font-size: 10.5px; color: var(--ink-mid); }

  /* ---------- detail panel ---------- */
  #panel {
    position: fixed; z-index: 6; top: 0; right: 0; height: 100%;
    width: min(360px, 92vw);
    background: var(--card); border-left: 1px solid var(--ink-faint);
    padding: 26px 24px 30px; overflow-y: auto;
    transform: translateX(102%); transition: transform 0.28s ease, visibility 0s 0.28s;
    visibility: hidden;
  }
  #panel.open { transform: translateX(0); visibility: visible; transition: transform 0.28s ease; }
  #panel .eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mid); }
  #panel h2 { font-size: 15px; line-height: 1.45; color: var(--ink-deep); margin: 10px 0 12px; overflow-wrap: anywhere; }
  #panel p { font-size: 12px; line-height: 1.65; margin-bottom: 12px; }
  #panel .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  #panel .chip { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--ink-faint); padding: 3px 7px; color: var(--ink); }
  #panel .chip.solid { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  #panel .meta { font-size: 11px; color: var(--ink-mid); margin-bottom: 14px; }
  #panel code, #panel .code {
    display: block; font-family: var(--mono); font-size: 10.5px; line-height: 1.6;
    background: var(--paper); border: 1px solid var(--ink-ghost);
    padding: 9px 10px; margin: 6px 0 12px; overflow-wrap: anywhere; white-space: pre-wrap;
  }
  #panel table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 14px; }
  #panel td { padding: 5px 6px 5px 0; border-bottom: 1px solid var(--ink-ghost); vertical-align: top; overflow-wrap: anywhere; }
  #panel td:first-child { color: var(--ink-mid); white-space: nowrap; padding-right: 10px; }
  #panel .warn { border-left: 2px solid var(--ink); padding-left: 10px; font-size: 11px; color: var(--ink); margin-bottom: 12px; }
  #panel-close {
    position: absolute; top: 14px; right: 14px; width: 30px; height: 30px;
    background: none; border: 1px solid var(--ink-faint); color: var(--ink-deep);
    font-family: var(--mono); font-size: 13px; cursor: pointer;
  }
  #panel-close:hover, #panel-close:focus-visible { border-color: var(--ink); outline: none; }

  #loading { position: fixed; inset: 0; display: grid; place-items: center; font-size: 12px; letter-spacing: 0.1em; color: var(--ink-mid); z-index: 4; }

  @media (max-width: 720px) {
    #masthead { left: 16px; top: 16px; }
    #controls { top: auto; bottom: 64px; right: 16px; left: 16px; }
    #search { flex: 1; width: auto; }
    #matchcount, body.search-open #matchcount { display: none; }
    #panel { top: auto; bottom: 0; height: auto; max-height: 62vh; width: 100%; border-left: none; border-top: 1px solid var(--ink-faint); transform: translateY(103%); }
    #panel.open { transform: translateY(0); }
    #footer { bottom: 16px; left: 16px; right: 16px; }
    #hint { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    #panel { transition: none; }
    .leaf.fire circle { animation: none; }
  }
</style>
</head>
<body>

<svg id="stage" role="img" aria-label="Radial mind map of the Crypto-Knowledge brain: sections, guides, endpoints, addresses, errors, tools and chains">
  <g id="viewport"></g>
</svg>

<div id="loading">loading the brain…</div>

<header id="masthead" class="chrome">
  <button class="zbtn" id="info-toggle" aria-expanded="false" aria-controls="masthead-body" title="About this map">i</button>
  <div id="masthead-body">
  <div class="wordmark"><a href="/">crypto-knowledge</a> · brain map</div>
  <p class="claim">Every node is knowledge an autonomous agent no longer has to burn tokens re-deriving. Click any node to inspect it.</p>
  <div id="statline" aria-live="off"></div>
  </div>
</header>

<div id="controls" class="chrome">
  <button class="zbtn" id="search-toggle" aria-expanded="false" aria-controls="search" title="Search the brain"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.6" y1="8.6" x2="12" y2="12"/></svg></button>
  <input id="search" type="search" placeholder="search the brain…" aria-label="Search all nodes" autocomplete="off" />
  <span id="matchcount"></span>
  <button class="zbtn" id="zoom-out" aria-label="Zoom out">−</button>
  <button class="zbtn" id="zoom-in" aria-label="Zoom in">+</button>
  <button class="zbtn" id="zoom-reset" aria-label="Reset view" title="Reset view">⌂</button>
</div>

<aside id="panel" role="dialog" aria-modal="false" aria-label="Node details">
  <button id="panel-close" aria-label="Close details">×</button>
  <div id="panel-body"></div>
</aside>

<footer id="footer" class="chrome">
  <span>POST /mcp</span>
  <a href="/about">about</a>
  <a href="/llms.txt">llms.txt</a>
  <a href="/skill.md">skill.md</a>
  <a href="https://github.com/DerDoPhil/crypto-knowledge">github</a>
  <a href="https://opensea.io/tools/erc8257/ethereum/71">opensea tool #71</a>
</footer>
<div id="hint" class="chrome">scroll to zoom · drag to pan</div>

<script>
(async function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const svgNS = "http://www.w3.org/2000/svg";
  const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  let data;
  try {
    data = await (await fetch("brain-data.json")).json();
  } catch (e) {
    $("#loading").textContent = "could not load brain-data.json — try reloading";
    return;
  }
  $("#loading").remove();

  /* ---------- stat line (count-up) ---------- */
  const S = data.stats;
  const statDefs = [
    [S.guides, "guides"], [S.steps, "verified steps"], [S.sections, "sections"],
    [S.endpoints, `endpoints (${S.keyless} keyless)`], [S.addressGroups, "address groups"],
    [S.errors, "error patterns"], [S.gotchas, "rpc gotchas"], [S.abis, "abi maps"],
    [S.tools, "live tools"], [S.chains, "chains"],
  ];
  const statline = $("#statline");
  statline.innerHTML = statDefs.map(([n, label]) => `<span><b data-n="${n}">0</b> ${esc(label)}</span>`).join("");
  const counters = statline.querySelectorAll("b");
  if (reducedMotion) {
    counters.forEach((b) => (b.textContent = b.dataset.n));
  } else {
    const t0 = performance.now();
    (function tick(t) {
      const p = Math.min(1, (t - t0) / 900), e = 1 - Math.pow(1 - p, 3);
      counters.forEach((b) => (b.textContent = Math.round(+b.dataset.n * e)));
      if (p < 1) requestAnimationFrame(tick);
    })(t0);
  }

  /* ---------- build the tree ---------- */
  // categories: 21 guide sections first, then the reference wings
  const cats = [];
  for (const sec of data.sections) {
    cats.push({
      name: sec.name, ref: false,
      leaves: sec.topics.map((t) => ({ kind: "guide", id: t, label: t, section: sec.name, d: data.guides[t] })),
    });
  }
  const refCats = [
    ["live tools", data.tools.map((t) => ({ kind: "tool", id: t.name, label: t.name, d: t }))],
    ["chains", data.chains.map((c) => ({ kind: "chain", id: c.key, label: c.name, d: c }))],
    ["api endpoints", data.endpoints.map((e) => ({ kind: "endpoint", id: e.name, label: e.name, d: e }))],
    ["address book", data.addresses.map((a) => ({ kind: "address", id: a.name, label: a.name, d: a }))],
    ["error patterns", data.errors.map((e, i) => ({ kind: "error", id: "err" + i, label: e.pattern, d: e }))],
    ["rpc gotchas", data.gotchas.map((g, i) => ({ kind: "gotcha", id: "rpc" + i, label: g.topic, d: g }))],
    ["abi selectors", data.abis.map((a) => ({ kind: "abi", id: a.name, label: a.name, d: a }))],
  ];
  for (const [name, leaves] of refCats) cats.push({ name, ref: true, leaves });

  const totalLeaves = cats.reduce((a, c) => a + c.leaves.length, 0);
  const GAP = 1.6; // angular gap between categories, in leaf units
  const unit = (Math.PI * 2) / (totalLeaves + GAP * cats.length);
  const R0 = 96, R1 = 270, R2 = 660;

  let angle = -Math.PI / 2;
  for (const cat of cats) {
    angle += (GAP / 2) * unit;
    for (const leaf of cat.leaves) {
      leaf.a = angle + unit / 2;
      angle += unit;
    }
    angle += (GAP / 2) * unit;
    cat.a = cat.leaves.length
      ? (cat.leaves[0].a + cat.leaves[cat.leaves.length - 1].a) / 2
      : angle;
  }

  const P = (a, r) => [Math.cos(a) * r, Math.sin(a) * r];
  const link = (a1, r1, a2, r2) => {
    const rm = (r1 + r2) / 2;
    const [x1, y1] = P(a1, r1), [x2, y2] = P(a2, r2), [c1x, c1y] = P(a1, rm), [c2x, c2y] = P(a2, rm);
    return `M${x1.toFixed(1)},${y1.toFixed(1)}C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;
  };
  const leafRadius = (l) =>
    l.kind === "guide" ? Math.min(1.8 + l.d.n * 0.28, 6.5)
    : l.kind === "tool" ? 4.2
    : l.kind === "chain" ? 3.6
    : l.kind === "abi" ? 3.2
    : 2.8;

  const vp = $("#viewport");
  const el = (tag, attrs) => {
    const n = document.createElementNS(svgNS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  };

  const edgesG = el("g", {}), leavesG = el("g", {}), catsG = el("g", {});
  vp.append(edgesG, leavesG, catsG);
  const allLeaves = [];

  for (const cat of cats) {
    const trunk = el("path", { d: link(cat.a, R0, cat.a, R1), class: "edge trunk" + (cat.ref ? " ref-trunk" : "") });
    edgesG.append(trunk);
    cat.trunkEl = trunk;

    for (const leaf of cat.leaves) {
      leaf.cat = cat;
      const edge = el("path", { d: link(cat.a, R1, leaf.a, R2), class: "edge" });
      edgesG.append(edge);
      leaf.edgeEl = edge;

      const deg = (leaf.a * 180) / Math.PI;
      const flip = leaf.a > Math.PI / 2 || leaf.a < -Math.PI / 2;
      const g = el("g", { class: "leaf" + (leaf.kind === "endpoint" && leaf.d.auth !== "none" ? " ring" : ""), transform: `rotate(${deg.toFixed(2)}) translate(${R2},0)` });
      const label = leaf.label.length > 30 ? leaf.label.slice(0, 29) + "…" : leaf.label;
      const t = el("text", flip
        ? { x: -9, "text-anchor": "end", dy: "0.32em", transform: "rotate(180)" }
        : { x: 9, "text-anchor": "start", dy: "0.32em" });
      t.textContent = label;
      g.append(el("circle", { r: leafRadius(leaf) }), t);
      leavesG.append(g);
      leaf.el = g;
      allLeaves.push(leaf);

      g.addEventListener("pointerenter", () => { edge.classList.add("hot"); cat.trunkEl.classList.add("hot"); });
      g.addEventListener("pointerleave", () => { edge.classList.remove("hot"); cat.trunkEl.classList.remove("hot"); });
      g.addEventListener("click", (ev) => { ev.stopPropagation(); openPanel(leaf); });
    }

    const deg = (cat.a * 180) / Math.PI;
    const flip = cat.a > Math.PI / 2 || cat.a < -Math.PI / 2;
    const g = el("g", { class: "cat", transform: `rotate(${deg.toFixed(2)}) translate(${R1},0)` });
    const t = el("text", flip
      ? { x: -12, "text-anchor": "end", dy: "0.32em", transform: "rotate(180)" }
      : { x: 12, "text-anchor": "start", dy: "0.32em" });
    t.textContent = cat.name;
    g.append(el("circle", { r: 4.5 }), t);
    catsG.append(g);
    cat.el = g;
  }

  // center
  const center = el("g", { id: "center-g" });
  center.append(el("circle", { r: R0 - 14, "stroke-width": 1.4 }), el("circle", { r: R0 - 26, "stroke-width": 0.6, "stroke-opacity": 0.4 }));



  const c1a = el("text", { class: "c1", dy: "-1.7em" }); c1a.textContent = "CRYPTO-";
  const c1b = el("text", { class: "c1", dy: "-0.55em" }); c1b.textContent = "KNOWLEDGE";
  const c2 = el("text", { class: "c2", dy: "1.15em" }); c2.textContent = "the on-chain brain";
  const c3a = el("text", { class: "c2", dy: "2.55em" }); c3a.textContent = S.guides + " guides";
  const c3b = el("text", { class: "c2", dy: "3.95em" }); c3b.textContent = S.endpoints + " endpoints";
  center.append(c1a, c1b, c2, c3a, c3b);
  vp.append(center);

  /* ---------- pan & zoom ---------- */
  const stage = $("#stage");
  let tx = 0, ty = 0, k = 1;
  const apply = () => vp.setAttribute("transform", `translate(${tx},${ty}) scale(${k})`);
  const fit = () => {
    const w = innerWidth, h = innerHeight;
    k = Math.min(w, h) / ((R2 + 240) * 2);
    k = Math.max(k, 0.32);
    tx = w / 2; ty = h / 2;
    apply();
  };
  fit();
  addEventListener("resize", fit);

  stage.addEventListener("wheel", (e) => {
    e.preventDefault();
    const f = Math.exp(-e.deltaY * 0.0016);
    const nk = Math.min(4.5, Math.max(0.18, k * f));
    tx = e.clientX - ((e.clientX - tx) / k) * nk;
    ty = e.clientY - ((e.clientY - ty) / k) * nk;
    k = nk; apply();
  }, { passive: false });

  const pointers = new Map();
  let lastPinch = 0;
  stage.addEventListener("pointerdown", (e) => {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    stage.setPointerCapture(e.pointerId);
    stage.classList.add("dragging");
  });
  stage.addEventListener("pointermove", (e) => {
    if (!pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    if (pointers.size === 1) {
      tx += e.clientX - prev.x; ty += e.clientY - prev.y; apply();
    } else if (pointers.size === 2) {
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      const [p1, p2] = [...pointers.values()];
      const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      if (lastPinch) {
        const f = dist / lastPinch, nk = Math.min(4.5, Math.max(0.18, k * f));
        const cx = (p1.x + p2.x) / 2, cy = (p1.y + p2.y) / 2;
        tx = cx - ((cx - tx) / k) * nk; ty = cy - ((cy - ty) / k) * nk;
        k = nk; apply();
      }
      lastPinch = dist;
      return;
    }
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  });
  const endPointer = (e) => { pointers.delete(e.pointerId); lastPinch = 0; stage.classList.remove("dragging"); };
  stage.addEventListener("pointerup", endPointer);
  stage.addEventListener("pointercancel", endPointer);

  const zoomBy = (f) => {
    const nk = Math.min(4.5, Math.max(0.18, k * f));
    const cx = innerWidth / 2, cy = innerHeight / 2;
    tx = cx - ((cx - tx) / k) * nk; ty = cy - ((cy - ty) / k) * nk;
    k = nk; apply();
  };
  $("#zoom-in").addEventListener("click", () => zoomBy(1.35));
  $("#zoom-out").addEventListener("click", () => zoomBy(1 / 1.35));
  $("#zoom-reset").addEventListener("click", fit);

  /* ---------- search ---------- */
  const searchInput = $("#search"), matchcount = $("#matchcount");
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    if (q.length < 2) {
      stage.classList.remove("searching");
      matchcount.textContent = "";
      allLeaves.forEach((l) => { l.el.classList.remove("hit"); l.edgeEl.classList.remove("hit"); });
      cats.forEach((c) => c.el.classList.remove("hit"));
      return;
    }
    stage.classList.add("searching");
    let hits = 0;
    const hitCats = new Set();
    for (const l of allLeaves) {
      const hay = (l.label + " " + (l.d.t || "") + " " + (l.d.s || l.d.what || l.d.purpose || l.d.cause || l.d.detail || "")).toLowerCase();
      const hit = hay.includes(q);
      l.el.classList.toggle("hit", hit);
      l.edgeEl.classList.toggle("hit", hit);
      if (hit) { hits++; hitCats.add(l.cat); }
    }
    cats.forEach((c) => c.el.classList.toggle("hit", hitCats.has(c)));
    matchcount.textContent = hits + " match" + (hits === 1 ? "" : "es");
  });

  /* ---------- chrome toggles (info + search) ---------- */
  const infoBtn = $("#info-toggle"), searchBtn = $("#search-toggle");
  const setInfo = (open) => { document.body.classList.toggle("info-open", open); infoBtn.setAttribute("aria-expanded", String(open)); };
  const setSearch = (open) => {
    document.body.classList.toggle("search-open", open);
    searchBtn.setAttribute("aria-expanded", String(open));
    if (open) searchInput.focus();
    else if (searchInput.value) { searchInput.value = ""; searchInput.dispatchEvent(new Event("input")); }
  };
  infoBtn.addEventListener("click", () => setInfo(!document.body.classList.contains("info-open")));
  searchBtn.addEventListener("click", () => setSearch(!document.body.classList.contains("search-open")));
  searchInput.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    e.stopPropagation();
    if (searchInput.value) { searchInput.value = ""; searchInput.dispatchEvent(new Event("input")); }
    else setSearch(false);
  });

  /* ---------- detail panel ---------- */
  const panel = $("#panel"), panelBody = $("#panel-body");
  const MCP = "https://crypto-knowledge-eight.vercel.app/mcp";
  const row = (k2, v) => `<tr><td>${esc(k2)}</td><td>${v}</td></tr>`;

  function openPanel(leaf) {
    const d = leaf.d;
    let html = "";
    if (leaf.kind === "guide") {
      html = `<div class="eyebrow">guide · ${esc(leaf.section)}</div>
        <h2>${esc(d.t)}</h2>
        <div class="chips">${d.sc.map((s) => `<span class="chip">${esc(s)}</span>`).join("")}</div>
        <p>${esc(d.s)}</p>
        <div class="meta">${d.n} verified steps · ${d.w} warning${d.w === 1 ? "" : "s"} · ${d.p} prerequisite${d.p === 1 ? "" : "s"}</div>
        <div class="eyebrow">fetch it (mcp or rest)</div>
        <code>knowledge { "action": "get_guide", "topic": "${esc(leaf.id)}" }\nPOST ${MCP}</code>`;
    } else if (leaf.kind === "endpoint") {
      html = `<div class="eyebrow">api endpoint</div>
        <h2>${esc(d.name)}</h2>
        <div class="chips"><span class="chip ${d.auth === "none" ? "solid" : ""}">${d.auth === "none" ? "keyless" : esc(d.auth)}</span></div>
        <p>${esc(d.what)}</p>
        <code>${esc(d.baseUrl)}</code>
        ${d.limits ? `<div class="meta">limits: ${esc(d.limits)}</div>` : ""}`;
    } else if (leaf.kind === "address") {
      html = `<div class="eyebrow">address book</div>
        <h2>${esc(d.name)}</h2>
        ${d.note ? `<p>${esc(d.note)}</p>` : ""}
        <table>${Object.entries(d.addresses).map(([c, a]) => row(c, `<span style="font-size:9.5px">${esc(a)}</span>`)).join("")}</table>`;
    } else if (leaf.kind === "error") {
      html = `<div class="eyebrow">error pattern</div>
        <h2>${esc(d.pattern)}</h2>
        <div class="eyebrow">cause</div><p>${esc(d.cause)}</p>
        <div class="eyebrow">fix</div><p>${esc(d.fix)}</p>`;
    } else if (leaf.kind === "gotcha") {
      html = `<div class="eyebrow">rpc gotcha</div>
        <h2>${esc(d.topic)}</h2><p>${esc(d.detail)}</p>`;
    } else if (leaf.kind === "abi") {
      html = `<div class="eyebrow">abi selector map</div>
        <h2>${esc(d.name)}</h2>
        ${d.interfaceId ? `<div class="meta">ERC-165 interfaceId: ${esc(d.interfaceId)}</div>` : ""}
        <div class="eyebrow">functions</div>
        <table>${d.functions.map((f) => row(f.selector, esc(f.sig))).join("")}</table>
        ${d.events.length ? `<div class="eyebrow">events (topic0)</div>
        <table>${d.events.map((e) => row(e.topic0.slice(0, 10) + "…", esc(e.sig))).join("")}</table>` : ""}`;
    } else if (leaf.kind === "tool") {
      html = `<div class="eyebrow">live tool</div>
        <h2>${esc(d.name)}</h2>
        <div class="chips">${d.kinds.map((s) => `<span class="chip">${esc(s)}</span>`).join("")}</div>
        <p>${esc(d.purpose)}</p>
        <div class="eyebrow">call it</div>
        <code>tools/call → "${esc(d.name)}"\nPOST ${MCP}</code>`;
    } else if (leaf.kind === "chain") {
      html = `<div class="eyebrow">supported chain</div>
        <h2>${esc(d.name)}</h2>
        <table>${row("kind", esc(d.kind))}${d.chainId != null ? row("chainId", esc(d.chainId)) : ""}${row("native", esc(d.nativeSymbol))}</table>
        ${d.explorer ? `<code>${esc(d.explorer)}</code>` : ""}`;
    }
    panelBody.innerHTML = html;
    panel.classList.add("open");
    document.body.classList.add("panel-open");
  }
  const closePanel = () => { panel.classList.remove("open"); document.body.classList.remove("panel-open"); };
  $("#panel-close").addEventListener("click", closePanel);
  addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (document.body.classList.contains("search-open")) { setSearch(false); return; }
    if (panel.classList.contains("open")) { closePanel(); return; }
    setInfo(false);
  });
  stage.addEventListener("click", closePanel);

  /* ---------- signature: synapse firing ---------- */
  if (!reducedMotion) {
    setInterval(() => {
      if (document.hidden || stage.classList.contains("searching")) return;
      const leaf = allLeaves[(Math.random() * allLeaves.length) | 0];
      leaf.el.classList.add("fire");
      leaf.edgeEl.classList.add("fire");
      leaf.cat.trunkEl.classList.add("fire");
      setTimeout(() => {
        leaf.el.classList.remove("fire");
        leaf.edgeEl.classList.remove("fire");
        leaf.cat.trunkEl.classList.remove("fire");
      }, 950);
    }, 2400);
  }
})();
</script>
</body>
</html>
